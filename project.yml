name: OpenScrobbler
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 6
    MARKETING_VERSION: 1.1.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: org.openscrobbler.app

targets:
  OpenScrobblerCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Domain/Track.swift
      - path: Sources/Domain/VaultModels.swift
      - path: Sources/Services/ListenBrainzService.swift
      - path: Sources/Core
    settings:
      base:
        PRODUCT_NAME: OpenScrobblerCore
        PRODUCT_MODULE_NAME: OpenScrobblerCore
        PRODUCT_BUNDLE_IDENTIFIER: org.openscrobbler.core
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

  OpenScrobbler:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
        excludes:
          - iOS
          - iOSWidgets
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: OpenScrobbler
        PRODUCT_MODULE_NAME: OpenScrobbler
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconFile: AppIcon.icns
        INFOPLIST_KEY_CFBundleName: OpenScrobbler
        INFOPLIST_KEY_CFBundleDisplayName: OpenScrobbler
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright (c) 2026

  OpenScrobbleriOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOS
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: OpenScrobblerCore
      - target: OpenScrobblerWidgets
        embed: true
    settings:
      base:
        PRODUCT_NAME: OpenScrobbler
        PRODUCT_MODULE_NAME: OpenScrobbleriOS
        PRODUCT_BUNDLE_IDENTIFIER: org.openscrobbler.app.ios
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: OpenScrobbler
        INFOPLIST_KEY_CFBundleDisplayName: OpenScrobbler
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright (c) 2026
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSAppleMusicUsageDescription: OpenScrobbler scans your music library play counts to submit new listens to ListenBrainz.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Config/OpenScrobbleriOS.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

  OpenScrobblerWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOSWidgets
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: OpenScrobblerCore
    settings:
      base:
        PRODUCT_NAME: OpenScrobblerWidgets
        PRODUCT_MODULE_NAME: OpenScrobblerWidgets
        PRODUCT_BUNDLE_IDENTIFIER: org.openscrobbler.app.ios.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/iOSWidgets/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: OpenScrobbler
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright (c) 2026
        CODE_SIGN_ENTITLEMENTS: Config/OpenScrobblerWidgets.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

  OpenScrobblerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
        excludes:
          - Fixtures
          - README.md
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: OpenScrobbler
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.openscrobbler.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenScrobbler.app/Contents/MacOS/OpenScrobbler"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  OpenScrobbler:
    build:
      targets:
        OpenScrobbler: all
        OpenScrobblerTests: [test]
    test:
      targets:
        - OpenScrobblerTests

  OpenScrobbleriOS:
    build:
      targets:
        OpenScrobbleriOS: all
        OpenScrobblerWidgets: all
