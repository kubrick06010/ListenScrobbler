name: ListenScrobbler
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 6
    MARKETING_VERSION: 1.1.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: org.listenscrobbler.app

targets:
  ListenScrobblerCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Domain/Track.swift
      - path: Sources/Domain/VaultModels.swift
      - path: Sources/Services/ListenBrainzService.swift
      - path: Sources/Services/MusicBrainzService.swift
      - path: Sources/Core
    settings:
      base:
        PRODUCT_NAME: ListenScrobblerCore
        PRODUCT_MODULE_NAME: ListenScrobblerCore
        PRODUCT_BUNDLE_IDENTIFIER: org.listenscrobbler.core
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

  ListenScrobbler:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
        excludes:
          - iOS
          - iOSWidgets
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: ListenScrobbler
        PRODUCT_MODULE_NAME: ListenScrobbler
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconFile: AppIcon.icns
        INFOPLIST_KEY_CFBundleName: ListenScrobbler
        INFOPLIST_KEY_CFBundleDisplayName: ListenScrobbler
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright (c) 2026

  ListenScrobbleriOS:
    type: application
    platform: iOS
    productName: ListenScrobbler
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOS
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: ListenScrobblerCore
      - target: ListenScrobblerWidgets
        embed: true
    settings:
      base:
        PRODUCT_NAME: ListenScrobbler
        PRODUCT_MODULE_NAME: ListenScrobbleriOS
        PRODUCT_BUNDLE_IDENTIFIER: org.listenscrobbler.app.ios
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: ListenScrobbler
        INFOPLIST_KEY_CFBundleDisplayName: ListenScrobbler
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright (c) 2026
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSAppleMusicUsageDescription: ListenScrobbler scans your music library play counts to submit new listens to ListenBrainz.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Config/ListenScrobbleriOS.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

  ListenScrobblerWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOSWidgets
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: ListenScrobblerCore
    settings:
      base:
        PRODUCT_NAME: ListenScrobblerWidgets
        PRODUCT_MODULE_NAME: ListenScrobblerWidgets
        PRODUCT_BUNDLE_IDENTIFIER: org.listenscrobbler.app.ios.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/iOSWidgets/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: ListenScrobbler
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright (c) 2026
        CODE_SIGN_ENTITLEMENTS: Config/ListenScrobblerWidgets.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

  ListenScrobblerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
        excludes:
          - Fixtures
          - README.md
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: ListenScrobbler
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: org.listenscrobbler.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ListenScrobbler.app/Contents/MacOS/ListenScrobbler"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ListenScrobbler:
    build:
      targets:
        ListenScrobbler: all
        ListenScrobblerTests: [test]
    test:
      targets:
        - ListenScrobblerTests

  ListenScrobbleriOS:
    build:
      targets:
        ListenScrobbleriOS: all
        ListenScrobblerWidgets: all
