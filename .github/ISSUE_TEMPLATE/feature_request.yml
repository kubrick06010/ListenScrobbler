name: Feature request
description: Suggest a product, metadata, archive, or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or project gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the behavior you want to see.
    validations:
      required: true
  - type: dropdown
    id: ecosystem
    attributes:
      label: Data source or ecosystem area
      options:
        - ListenBrainz
        - MusicBrainz
        - Cover Art Archive
        - Local vaults or exports
        - macOS player integration
        - UI or workflow
        - Other
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link API docs, MusicBrainz entities, ListenBrainz examples, screenshots, or related issues.
